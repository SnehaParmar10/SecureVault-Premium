<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureVault | Sneha Parmar</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="vault-container">
        <h2>SECURE VAULT</h2>
        <input type="password" id="secret-key" class="key-input" placeholder="Enter Secret Encryption Key">
        <textarea id="input-text" rows="8" placeholder="Enter text to encrypt or decrypt..."></textarea>
        
        <div class="controls">
            <button class="btn-encrypt" onclick="encrypt()">ENCRYPT</button>
            <button class="btn-decrypt" onclick="decrypt()">DECRYPT</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
